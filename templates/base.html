<!DOCTYPE html>
<html>
<head>
    <title>My App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .navbar {
            background: #333;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .navbar a:hover {
            color: yellow;
        }

        .content {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/">Home</a>
        <a href="/login/">Login</a>
        <a href="/todo/">Todo</a>
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
