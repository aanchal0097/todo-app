{% extends 'base.html' %}

{% block content %}

<div class="container">
    <h2>🔐 Login</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="/register/">Register</a></p>
</div>

<style>
    body {
        background: linear-gradient(to right, #667eea, #764ba2);
    }

    .container {
        width: 350px;
        margin: 100px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
    }

    input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
    }

    button {
        width: 95%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
    }
</style>

{% endblock %}
